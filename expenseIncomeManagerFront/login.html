<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestor Financiero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            height: auto !important; 
            min-height: 100vh;
            overflow-y: auto !important; /* Devolvemos el scroll vertical */
            padding: 2rem 1rem !important; /* Quitamos el espacio gigante de la navbar */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
        }
        .auth-card {
            width: 100%;
            max-width: 400px; /* Ancho perfecto para un login */
            background-color: var(--card-bg);
            border: 1px solid var(--ui-border);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
        }
        .brand-title {
            color: var(--secondary);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h3 class="brand-title">Gestor Financiero</h3>
        <h5 class="text-center text-muted mb-4 fs-6">Iniciar Sesión</h5>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-medium text-muted small">Nombre de usuario</label>
                <input type="text" id="loginUsername" class="form-control" placeholder="Introduce tu usuario" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium text-muted small">Contraseña</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Entrar</button>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
            <span class="text-muted small">¿No tienes cuenta?</span>
            <a href="register.html" class="text-primary fw-bold text-decoration-none ms-1 small">Regístrate aquí</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="login.js"></script>
</body>
</html>
