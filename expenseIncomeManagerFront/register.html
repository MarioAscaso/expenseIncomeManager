<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestor Financiero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            height: 100vh !important; 
            overflow: hidden !important; 
            padding: 1rem !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
        }
        .auth-card {
            width: 100%;
            max-width: 480px; /* Un pelín más ancho para que quepan las dos columnas cómodamente */
            background-color: var(--card-bg);
            border: 1px solid var(--ui-border);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 1.5rem 2rem; 
        }
        .brand-title {
            color: var(--secondary);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 0.5rem; 
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h3 class="brand-title">Gestor Financiero</h3>
        <h6 class="text-center text-muted mb-3">Crea tu cuenta</h6> 
        
        <form id="registerForm">
            <div class="mb-2"> 
                <label class="form-label fw-medium text-muted small mb-1">Nombre de usuario</label>
                <input type="text" id="registerUsername" class="form-control form-control-sm py-2" placeholder="Elige un usuario" required>
            </div>
            
            <div class="row gx-2">
                <div class="col-sm-6 mb-2">
                    <label class="form-label fw-medium text-muted small mb-1">Correo Electrónico</label>
                    <input type="email" id="registerEmail" class="form-control form-control-sm py-2" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="col-sm-6 mb-2">
                    <label class="form-label fw-medium text-muted small mb-1">Teléfono (Bizum)</label>
                    <input type="tel" id="registerPhone" class="form-control form-control-sm py-2" placeholder="Ej: 600123456" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-medium text-muted small mb-1">Contraseña</label>
                <input type="password" id="registerPassword" class="form-control form-control-sm py-2" placeholder="Mínimo 8 caracteres" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-1">Registrarse</button>
        </form>

        <div class="text-center mt-3 pt-2 border-top"> 
            <span class="text-muted small">¿Ya tienes cuenta?</span>
            <a href="login.html" class="text-primary fw-bold text-decoration-none ms-1 small">Inicia sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="register.js"></script>
</body>
</html>
