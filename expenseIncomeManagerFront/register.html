<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestor de Gastos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-5">Expense & Income Manager</h1>

        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 border-top border-success border-4">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center mb-4">Crear una Cuenta</h4>
                        
                        <div id="alertMessage" class="alert d-none text-center" role="alert"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Elige un nombre de Usuario</label>
                                <input type="text" class="form-control" id="registerUsername" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Crea una Contraseña</label>
                                <input type="password" class="form-control" id="registerPassword" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2">Registrarse</button>
                        </form>

                        <div class="text-center mt-3">
                            <span class="text-muted">¿Ya tienes una cuenta?</span> 
                            <a href="login.html" class="text-decoration-none">Inicia sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
