<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Income Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h2 class="m-0">Gestor Financiero</h2>
            <div>
                <button id="btnToggleNotifications" class="btn btn-outline-secondary btn-sm me-2" title="Activar/Desactivar Emails">
                    🔔 <span id="notificationStatus">Activas</span>
                </button>
                <span class="me-3">Hola, <strong id="loggedUserName" class="text-primary"></strong> (<span id="loggedUserRole" class="text-muted"></span>)</span>
                <button id="btnLogout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
            </div>
        </div>

        <div class="card mb-4 shadow-sm text-center">
            <div class="card-body">
                <h3>Saldo Actual: <span id="balanceValue" class="text-warning">0.00</span></h3>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#transferModal">Transferencia (Usuario)</button>
                    <button class="btn btn-info text-white fw-bold" style="background-color: #00c4b3; border-color: #00c4b3;" data-bs-toggle="modal" data-bs-target="#bizumModal">Hacer un Bizum</button>
                </div>
            </div>
        </div>

        <div id="calendar"></div>
    </div>

    <div class="modal fade" id="transactionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="transactionForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Nueva Transacción</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="transactionId">
                        
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <input type="text" class="form-control" id="description" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Importe</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="amount" required>
                        </div>

                        <div class="mb-3" id="fileInputContainer">
                            <label class="form-label">Ticket o Factura (Opcional)</label>
                            <input type="file" class="form-control" id="file" accept="image/*,.pdf">
                        </div>

                        <div id="fileViewer" class="mb-3 d-none text-center">
                            <a id="fileLink" href="#" target="_blank" class="btn btn-outline-info btn-sm">Ver archivo adjunto</a>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" id="category" required>
                                <option value="EXPENSE">Gasto</option>
                                <option value="INCOME">Ingreso</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger d-none" id="btnDelete">Eliminar</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="transferModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="transferForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Nueva Transferencia</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Destinatario (Nombre de usuario)</label>
                            <input type="text" id="targetUser" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Importe a enviar</label>
                            <input type="number" step="0.01" min="0.01" id="transferAmount" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Concepto</label>
                            <input type="text" id="transferConcept" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Enviar Transferencia</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bizumModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="bizumForm">
                    <div class="modal-header text-white" style="background-color: #00c4b3;">
                        <h5 class="modal-title fw-bold">Enviar Bizum</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Teléfono del destinatario</label>
                            <input type="tel" id="bizumPhone" class="form-control" placeholder="Ej: 600123456" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Importe a enviar (€)</label>
                            <input type="number" step="0.01" min="0.01" id="bizumAmount" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Concepto</label>
                            <input type="text" id="bizumConcept" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn fw-bold text-white" style="background-color: #00c4b3;">Enviar Bizum</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
