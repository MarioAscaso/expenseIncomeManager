<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Income Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar fixed-top custom-navbar shadow-sm">
        <div class="container-fluid px-3 flex-nowrap align-items-center">
            
            <a class="navbar-brand fw-bold text-primary mb-0 me-3" href="#" style="font-size: 1.15rem;">
                <span class="d-none d-sm-inline">Gestor Financiero</span>
                <span class="d-sm-none">GF</span>
            </a>

            <div class="d-flex align-items-center justify-content-center mx-1 mx-md-3">
                <button id="btnPrevMonth" class="btn btn-sm btn-light border rounded-circle px-2 shadow-sm py-0" style="height: 28px;">&lt;</button>
                <span id="customCalendarTitle" class="mx-2 mb-0 fw-bold text-capitalize text-center" style="min-width: 120px; font-size: 0.95rem; color: var(--text-main);"></span>
                <button id="btnNextMonth" class="btn btn-sm btn-light border rounded-circle px-2 shadow-sm py-0" style="height: 28px;">&gt;</button>
                <button id="btnToday" class="btn btn-sm btn-outline-primary ms-2 py-0 px-2 rounded-pill d-none d-md-block" style="font-size: 0.8rem; height: 26px;">Hoy</button>
            </div>

            <div class="d-flex align-items-center flex-nowrap gap-2 ms-auto">
                
                <div class="balance-badge d-flex align-items-center px-3 py-0 rounded-pill">
                    <span id="balanceValue" class="text-warning fw-bold mb-0" style="font-size: 1.05rem;">0.00 €</span>
                </div>

                <button class="btn btn-primary btn-sm rounded-pill px-3 py-1 shadow-sm fw-semibold" style="font-size: 0.85rem;" data-bs-toggle="modal" data-bs-target="#transferModal">Transferencia</button>
                <button class="btn btn-info btn-sm text-white rounded-pill px-3 py-1 shadow-sm fw-semibold" style="font-size: 0.85rem; background-color: #00c4b3; border-color: #00c4b3;" data-bs-toggle="modal" data-bs-target="#bizumModal">Bizum</button>
                
                <div class="vr d-none d-lg-block mx-2 text-muted"></div>

                <button id="btnToggleNotifications" class="btn btn-light btn-sm rounded-circle border shadow-sm p-1 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;" title="Activar/Desactivar Emails">
                    🔔<span id="notificationStatus" class="d-none">Activas</span>
                </button>
                
                <span class="text-muted small ms-2 d-none d-lg-inline border-start ps-3 text-truncate" style="max-width: 150px;">
                    <strong id="loggedUserName" class="text-primary"></strong> 
                    <span id="loggedUserRole" class="d-none"></span> </span>
                
                <button id="btnLogout" class="btn btn-outline-danger btn-sm rounded-pill px-3 py-1 ms-2 fw-semibold" style="font-size: 0.85rem;">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <div id="calendar"></div>
    </div>

    <div class="modal fade" id="transactionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="transactionForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Nueva Transacción</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="transactionId">
                        <div class="mb-3"><label class="form-label">Descripción</label><input type="text" class="form-control" id="description" required></div>
                        <div class="mb-3"><label class="form-label">Importe</label><input type="number" step="0.01" min="0" class="form-control" id="amount" required></div>
                        <div class="mb-3" id="fileInputContainer"><label class="form-label">Ticket o Factura (Opcional)</label><input type="file" class="form-control" id="file" accept="image/*,.pdf"></div>
                        <div id="fileViewer" class="mb-3 d-none text-center"><a id="fileLink" href="#" target="_blank" class="btn btn-outline-info btn-sm">Ver archivo adjunto</a></div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" id="category" required>
                                <option value="EXPENSE">Gasto</option>
                                <option value="INCOME">Ingreso</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger d-none" id="btnDelete">Eliminar</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="transferModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="transferForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Nueva Transferencia</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Destinatario (Usuario)</label><input type="text" id="targetUser" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Importe</label><input type="number" step="0.01" min="0.01" id="transferAmount" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Concepto</label><input type="text" id="transferConcept" class="form-control" required></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Enviar Transferencia</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bizumModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="bizumForm">
                    <div class="modal-header text-white" style="background-color: #00c4b3;">
                        <h5 class="modal-title fw-bold">Enviar Bizum</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Teléfono</label><input type="tel" id="bizumPhone" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Importe</label><input type="number" step="0.01" min="0.01" id="bizumAmount" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Concepto</label><input type="text" id="bizumConcept" class="form-control" required></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn fw-bold text-white" style="background-color: #00c4b3;">Enviar Bizum</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
